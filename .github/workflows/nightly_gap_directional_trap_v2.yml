# .github/workflows/nightly_gap_directional_trap_v2.yml
#
# Nightly pipeline for gap_directional_trap__candidate_1_v2
# track: plan_next_day_day_trade
#
# Runs after market close on every weekday (Mon-Fri).
# Schedule: 20:35 UTC = 4:35 PM ET (market closes 4:00 PM ET).
#
# On each run:
#   1. Restores parquet data cache from previous run (via actions/cache)
#   2. Runs Stage 0: incremental data refresh (extends existing cache, new days only)
#   3. Saves updated cache for the next run
#   4. Runs Stage 1: nightly signal scan
#   5. Runs Stage 2: selection layer
#   6. Runs Stage 3: Telegram delivery
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MASSIVE_API_KEY      — data provider API key
#   TELEGRAM_BOT_TOKEN   — Telegram bot token
#   TELEGRAM_CHAT_ID     — Telegram chat/channel ID
#
# workflow_dispatch inputs allow manual test runs.

name: Nightly Gap Directional Trap v2

on:
  schedule:
    # 20:35 UTC = 4:35 PM ET — runs Mon–Fri after market close
    - cron: '35 20 * * 1-5'

  workflow_dispatch:
    inputs:
      signal_date:
        description: 'Signal date (YYYY-MM-DD). Leave blank for auto-detect.'
        required: false
        default: ''
      preview_mode:
        description: 'Preview only — print Telegram message without sending'
        type: boolean
        required: false
        default: false
      skip_refresh:
        description: 'Skip Stage 0 data refresh (use cached data only)'
        type: boolean
        required: false
        default: false

# Prevent overlapping runs. If a previous run is still in progress when the
# next schedule fires, do NOT cancel it — let it finish.
concurrency:
  group: nightly-gap-trap-v2
  cancel-in-progress: false

jobs:
  run-nightly-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --quiet --upgrade massive pandas pyarrow numpy requests

      # ── 4. Compute today's date for cache key ───────────────────────────────
      - name: Get current date (UTC)
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      # ── 5. Restore data cache ───────────────────────────────────────────────
      # Cache stores the daily OHLCV parquets and market reference parquets.
      # Key uses today's date; restore-keys fall back to the most recent daily key.
      # On a fresh repo with no cache, Stage 0 will fetch from scratch (slower first run).
      - name: Restore data cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            1_0_strategy_research/research_data_cache/daily/
            1_0_strategy_research/research_data_cache/market/
          key: data-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            data-cache-

      # ── 6. Run nightly pipeline ─────────────────────────────────────────────
      - name: Run nightly pipeline (v2)
        env:
          MASSIVE_API_KEY:    ${{ secrets.MASSIVE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Build argument list
          ARGS=""

          # Signal date override (manual dispatch only)
          if [ -n "${{ github.event.inputs.signal_date }}" ]; then
            ARGS="$ARGS --signal-date ${{ github.event.inputs.signal_date }}"
          fi

          # Preview mode (manual dispatch only)
          if [ "${{ github.event.inputs.preview_mode }}" = "true" ]; then
            ARGS="$ARGS --preview"
          fi

          # Skip refresh (manual dispatch only)
          if [ "${{ github.event.inputs.skip_refresh }}" = "true" ]; then
            ARGS="$ARGS --skip-refresh"
          fi

          echo "Running orchestrator with args: $ARGS"
          cd 2_0_agent_engineering
          python engineering_nightly_orchestrator__gap_directional_trap__candidate_1_v2.py $ARGS

      # ── 7. Save updated data cache ──────────────────────────────────────────
      # Saves the incrementally extended parquets for the next run.
      # Only runs if Stage 0 extended any data (or if cache was already fresh).
      # The cache is keyed by today's date — the next day's run will restore this.
      - name: Save updated data cache
        # Always save even if the pipeline step above failed, so partial updates
        # are not lost. If refresh was skipped the cache state is unchanged (OK).
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            1_0_strategy_research/research_data_cache/daily/
            1_0_strategy_research/research_data_cache/market/
          key: data-cache-${{ steps.date.outputs.date }}

      # ── 8. Upload runtime outputs as artifact ────────────────────────────────
      # Keeps the signal packs, ranked packs, selected_top_3, and summaries
      # accessible via the GitHub Actions UI for 14 days.
      - name: Upload runtime outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-outputs-${{ steps.date.outputs.date }}
          path: 2_0_agent_engineering/engineering_runtime_outputs/plan_next_day_day_trade/
          retention-days: 14
          if-no-files-found: warn
