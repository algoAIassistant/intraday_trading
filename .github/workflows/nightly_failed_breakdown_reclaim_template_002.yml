# .github/workflows/nightly_failed_breakdown_reclaim_template_002.yml
#
# Nightly pipeline for:
#   failed_breakdown_reclaim__weak_reclaim_depth__time_exit_primary__template_002
# track: plan_next_day_day_trade
#
# Runs after market close on every weekday (Mon–Fri).
# Schedule: 21:05 UTC = 5:05 PM ET.
#   Scheduled 30 minutes after the gap_directional_trap workflow (20:35 UTC)
#   to allow that pipeline to complete and save the shared data cache first.
#   This variant has no data refresh step — it reads from the shared cache
#   populated by gap_directional_trap.
#
# On each run:
#   1. Restores shared data cache (written by gap_directional_trap workflow)
#   2. Runs Stage 1: nightly signal scan
#   3. Runs Stage 2: run summary (JSON)
#   4. Runs Stage 3: Telegram delivery
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN   — Telegram bot token
#   TELEGRAM_CHAT_ID     — Telegram chat/channel ID
#
# Note: MASSIVE_API_KEY is NOT required — data refresh belongs to gap_directional_trap.
# If gap_directional_trap has not yet run today, the scan will use yesterday's cache.
#
# workflow_dispatch inputs allow manual test runs.

name: Nightly Failed Breakdown Reclaim Template 002

on:
  schedule:
    # 21:05 UTC = 5:05 PM ET — runs Mon–Fri, after gap_directional_trap pipeline completes
    - cron: '5 21 * * 1-5'

  workflow_dispatch:
    inputs:
      signal_date:
        description: 'Signal date (YYYY-MM-DD). Leave blank for auto-detect.'
        required: false
        default: ''
      preview_mode:
        description: 'Preview only — print Telegram message without sending'
        type: boolean
        required: false
        default: false
      skip_scan:
        description: 'Skip Stage 1 (re-summarize and re-deliver existing signal pack)'
        type: boolean
        required: false
        default: false

# Prevent overlapping runs. If a previous run is still in progress, let it finish.
concurrency:
  group: nightly-failed-breakdown-reclaim-template-002
  cancel-in-progress: false

jobs:
  run-nightly-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --quiet --upgrade pandas pyarrow numpy requests

      # ── 4. Compute today's date for cache key ───────────────────────────────
      - name: Get current date (UTC)
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      # ── 5. Restore shared data cache ────────────────────────────────────────
      # Reads the cache saved by the gap_directional_trap workflow.
      # This variant does not refresh data — it reads from the existing cache only.
      # If today's cache key is not found, falls back to the most recent available.
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            1_0_strategy_research/research_data_cache/daily/
            1_0_strategy_research/research_data_cache/market/
          key: data-cache-${{ steps.date.outputs.date }}
          restore-keys: |
            data-cache-

      # ── 5b. Ensure required directories exist (cold-start safety) ───────────
      - name: Ensure directories exist
        run: |
          mkdir -p 1_0_strategy_research/research_data_cache/daily
          mkdir -p 1_0_strategy_research/research_data_cache/market/daily
          mkdir -p 2_0_agent_engineering/engineering_runtime_outputs/plan_next_day_day_trade/failed_breakdown_reclaim__template_002

      # ── 6. Run nightly pipeline ─────────────────────────────────────────────
      - name: Run nightly pipeline (failed_breakdown_reclaim template_002)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""

          # Signal date override (manual dispatch only)
          if [ -n "${{ github.event.inputs.signal_date }}" ]; then
            ARGS="$ARGS --signal-date ${{ github.event.inputs.signal_date }}"
          fi

          # Preview mode (manual dispatch only)
          if [ "${{ github.event.inputs.preview_mode }}" = "true" ]; then
            ARGS="$ARGS --preview"
          fi

          # Skip scan (manual dispatch only — re-deliver existing signal pack)
          if [ "${{ github.event.inputs.skip_scan }}" = "true" ]; then
            ARGS="$ARGS --skip-scan"
          fi

          echo "Running orchestrator with args: $ARGS"
          python 2_0_agent_engineering/engineering_nightly_orchestrator__failed_breakdown_reclaim__template_002.py $ARGS

      # ── 7. Upload runtime outputs as artifact ────────────────────────────────
      - name: Upload runtime outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fbr-runtime-outputs-${{ steps.date.outputs.date }}
          path: 2_0_agent_engineering/engineering_runtime_outputs/plan_next_day_day_trade/failed_breakdown_reclaim__template_002/
          retention-days: 14
          if-no-files-found: warn
