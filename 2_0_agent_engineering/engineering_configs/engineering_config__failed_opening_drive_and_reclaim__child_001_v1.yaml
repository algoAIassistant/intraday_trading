# engineering_config__failed_opening_drive_and_reclaim__child_001_v1.yaml
#
# Configuration for the first engineering module:
#   failed_opening_drive_and_reclaim__child_001_v1
#
# Frozen on: 2026-03-25
# Phase:     phase_e0 (paper trading / replay only)
#
# IMPORTANT: The 'rules' section is frozen. Do not modify without reopening research.
# Only 'risk', 'paper_trading', and 'logging' parameters are engineering-side controls.

strategy_id: "failed_opening_drive_and_reclaim__child_001_v1"
track: "intraday_same_day"
family: "failed_opening_drive_and_reclaim"
branch: "child_001"
variant: "V1"
frozen_on: "2026-03-25"
engineering_phase: "phase_e0"

# ---------------------------------------------------------------------------
# Locked rule parameters — DO NOT MODIFY
# These exactly match the frozen survivor specification.
# ---------------------------------------------------------------------------
rules:
  price_filter_min_usd: 5.00
  price_filter_max_usd: 20.00
  drive_direction: "down"
  drive_window_bars: 30           # bars 1-30 (09:30-09:59 ET, 1-minute bars)
  drive_magnitude_pct: 2.0        # close of bar 30 must be >= 2.0% below session open
  drive_flat_threshold_pct: 0.10  # minimum directional move to count at all
  reclaim_bar_start: 31           # reclaim detection starts at bar 31
  entry_at: "reclaim_bar_close"   # enter at close of first bar where close >= session_open
  stop: "none"                    # CRITICAL: no intraday stop — destroys the edge
  target: "none"
  exit_time_et: "15:59"           # session close exit (last hour contributes ~50% of edge)

# V4 overlay definition — not primary, annotated on signals for future sizing use
v4_overlay:
  annotate_on_signal: true        # always annotate v4_early_reclaim on StrategySignal
  early_reclaim_max_bar: 60       # reclaim at or before bar 60 = V4 event
  active_for_sizing: false        # set true when V4 sizing overlay is implemented

# ---------------------------------------------------------------------------
# Regime gate
# ---------------------------------------------------------------------------
regime_gate:
  mode: "precomputed"             # 'precomputed' | 'live' (live: not yet implemented)
  bearish_threshold_pct: -0.10    # monthly universe OTC <= -0.10% = bearish = no trades
  # Path to precomputed regime map CSV (relative to repo root, or absolute)
  # Generated by: python 2_0_agent_engineering/engineering_source_code/market_climate_engine/engineering_build_regime_map.py
  regime_map_path: "2_0_agent_engineering/engineering_configs/engineering_regime_map__2026_03_26.csv"
  # Coverage: 2021-03 through 2026-03 (61 months; 2026-03 is partial — computed from available data).
  # To refresh: re-run engineering_build_regime_map.py and update this path to the new dated file.

# ---------------------------------------------------------------------------
# Paper trading controls
# ---------------------------------------------------------------------------
paper_trading:
  enabled: true
  fill_model: "bar_close"         # fill at bar close (same model as research)
  roundtrip_slippage_bp: 10       # 10bp roundtrip = realistic for $5-$20 with limit orders
                                  # Research showed edge survives at 15bp. 10bp = conservative.
                                  # Set to 0 for gross (no slippage) comparison.

# ---------------------------------------------------------------------------
# Portfolio-level risk controls
# ---------------------------------------------------------------------------
risk:
  portfolio_value_usd: 50000.0    # starting portfolio value for paper trading
  max_open_positions: 5           # max simultaneous positions
  max_position_size_pct: 0.10     # max 10% of portfolio per position
  daily_loss_limit_pct: -0.02     # halt new entries if portfolio is down -2% intraday
  tail_guard_stop_pct: null       # optional hard per-position stop (null = disabled)
                                  # If enabled, set to -0.08 to -0.10 (p5 tail = -5.1%)
                                  # Any stop tighter than -5% will impair the edge.

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  output_dir: "2_0_agent_engineering/engineering_runtime_outputs"
  log_level: "INFO"
  log_to_console: true
